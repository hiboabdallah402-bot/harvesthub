<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Community Lost & Found Portal</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS for polished cards -->
  <style>
    /* Body background */
    body {
      background-color: #f5f7fa;
    }

    /* Card style */
    .card {
      background-color: #ffffff;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    /* Hover effect */
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 25px rgba(0,0,0,0.2);
    }

    /* Card body spacing */
    .card-body {
      padding: 1.2rem;
    }

    /* Card title */
    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
    }

    /* Status badge */
    .badge {
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.45rem 0.8rem;
      border-radius: 50px;
    }

    /* Buttons spacing */
    .card-body .btn {
      width: 48%;
    }
  </style>
</head>

<body>

<div class="container mt-4 mb-5">

  <!-- Header -->
  <div class="card shadow-sm mb-4 border-0">
    <div class="card-body text-center bg-primary text-white rounded">
      <h2 class="mb-1">
        <i class="bi bi-search"></i> Community Lost & Found Portal
      </h2>
      <small>Report and track lost or found items in your community</small>
    </div>
  </div>

  <!-- Form -->
  <form id="itemForm" class="card shadow-sm p-4 mb-4 border-0">
    <h5 class="text-primary mb-3">
      <i class="bi bi-plus-circle"></i> Report Item
    </h5>

    <input type="hidden" id="itemId">

    <div class="row g-3">
      <div class="col-md-4">
        <input type="text" id="itemName" class="form-control" placeholder="Item Name" required>
      </div>

      <div class="col-md-3">
        <input type="text" id="category" class="form-control" placeholder="Category" required>
      </div>

      <div class="col-md-3">
        <input type="text" id="location" class="form-control" placeholder="Location" required>
      </div>

      <div class="col-md-2">
        <select id="status" class="form-select">
          <option value="Lost">Lost</option>
          <option value="Found">Found</option>
        </select>
      </div>
    </div>
    <div class="col-md-1">
    <input type="date" id="date" class="form-control" required>
  </div>

    <div class="row g-3 mt-2 align-items-center">
      <div class="col-md-6">
        <input type="text" id="contact" class="form-control" placeholder="Contact Number" required>
      </div>

      <div class="col-md-6 text-end">
        <button type="submit" class="btn btn-success">
          <i class="bi bi-save"></i> Save Item
        </button>
      </div>
    </div>
  </form>

  <!-- Cards Section -->
  <div class="card shadow-sm border-0">
    <div class="card-body">
      <h5 class="text-primary mb-3">
        <i class="bi bi-grid-3x3-gap"></i> Reported Items
      </h5>

      <div class="row" id="itemsList">
        <!-- Cards injected here -->
      </div>
    </div>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="Lost.js"></script>

</body>
</html>
