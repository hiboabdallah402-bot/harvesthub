<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" >
</head>
<body>
    <div class="bg-danger text-white container-fluid p-2">
        <h1 class="text-center">My Movie Collection</h1>
    </div>
    <div class="row m-5" id="movies-container">

    </div>

    <div class="form m-5">
        <form id="movieForm">
            <div class="mb-3">
  <label for="movieTitle" class="form-label text-danger">Movie Name</label>
  <input type="text" class="form-control" id="movieTitle" placeholder="Enter movie name">
</div>
<div class="form m-2">
  <label for="movieImage" class="form-label text-danger">Movie Image URL</label>
  <input type="text" class="form-control" id="movieImage" placeholder="Enter image URL">
</div>
<div class="form m-2  ">
  <label for="movieId" class="form-label text-danger">Movie Id</label>
  <input type="number" class="form-control" id="movieId" placeholder="Enter movie ID">
</div>
<div class="mb-3">
  <label for="moviePlot" class="form-label text-danger">Movie Description</label>
  <textarea class="form-control" id="moviePlot" rows="3" placeholder="Enter movie description"></textarea>
</div>
<button type="submit" class="btn btn-danger mt-2">Add the movie</button>
        </form>
    </div>
    <div class="row m-5" id="movie-container">
        </div>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
    <script src="/movie.js"></script>
</body>
</html>
